name: Security

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
  pull_request:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit (prod)
        run: npm run audit
