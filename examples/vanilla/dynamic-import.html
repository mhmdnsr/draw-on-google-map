<!DOCTYPE html>
<html>
  <head>
    <title>Draw On Google Map - Dynamic Import Example</title>
    <style>
      #map {
        height: 500px;
        width: 100%;
      }
    </style>
    <script>
      (g => {
        let h, a, k, p = 'The Google Maps JavaScript API', c = 'google', l = 'importLibrary', q = '__ib__', m = document, b = window;
        b = b[c] || (b[c] = {});
        const d = b.maps || (b.maps = {}), r = new Set(), e = new URLSearchParams();
        const u = () => h || (h = new Promise(async (f, n) => {
          a = m.createElement('script');
          e.set('key', g.key);
          e.set('v', g.v || 'weekly');
          e.set('libraries', [...r] + '');
          e.set('callback', c + '.maps.' + q);
          a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
          d[q] = f;
          a.onerror = () => n(Error(p + ' could not load.'));
          m.head.append(a);
        }));
        d[l] ? console.warn(p + ' only loads once. Ignoring:', g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n));
      })({ key: 'YOUR_API_KEY' });
    </script>
  </head>
  <body>
    <h1>Draw On Google Map - Dynamic Import</h1>
    <div id="map"></div>

    <script type="module">
      import DrawOnMap from '/dist/draw-on-google-map.es.js';

      const { Map } = await google.maps.importLibrary('maps');
      await google.maps.importLibrary('geometry');
      await google.maps.importLibrary('marker');

      const map = new Map(document.getElementById('map'), {
        center: { lat: -34.397, lng: 150.644 },
        zoom: 8,
        mapId: 'DEMO_MAP_ID',
      });

      const draw = new DrawOnMap(map);
      draw.brush.startDraw();
    </script>
  </body>
</html>
